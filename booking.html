<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Service - SimpleCo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-container">
    <h1>Book a Service</h1>
    <form class="booking-form" id="bookingForm">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your Name" required />
      <div class="error" id="nameError"></div>
      <label for="bookingEmail">Email</label>
      <input type="email" id="bookingEmail" name="bookingEmail" placeholder="Your Email" required />
      <div class="error" id="bookingEmailError"></div>
      <label for="service">Service</label>
      <select id="service" name="service" required>
        <option value="">Select a service</option>
        <option value="consultation">Consultation</option>
        <option value="web-development">Web Development</option>
        <option value="seo">SEO Optimization</option>
      </select>
      <div class="error" id="serviceError"></div>
      <label for="date">Preferred Date</label>
      <input type="date" id="date" name="date" required />
      <div class="error" id="dateError"></div>
      <button type="submit">Request Booking</button>
      <div class="success" id="bookingSuccess"></div>
    </form>
    <a href="index.html">← Back Home</a>
  </div>
  <!-- Footer -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
      });
  </script>
  <script src="script.js"></script>
</body>
</html>
