<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Company Site</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <nav class="navbar">
      <h1 class="logo">SimpleCo</h1>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html" class="btn-login">Login</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h2>Welcome to SimpleCo</h2>
    <p>We build clean and modern web solutions for businesses.</p>
    <a href="login.html" class="hero-btn">Get Started</a>
  </section>

  <!-- Newsletter Subscription -->
  <section class="newsletter-section">
    <h3>Subscribe to our Newsletter</h3>
    <form id="newsletterForm" class="newsletter-form">
      <input type="email" id="newsletterEmail" placeholder="Enter your email" required />
      <button type="submit">Subscribe</button>
      <div id="newsletterMsg" class="newsletter-msg"></div>
    </form>
  </section>

  <!-- Footer -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
      });
  </script>

  <script src="script.js"></script>
</body>
</html>
