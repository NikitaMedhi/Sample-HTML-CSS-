<!-- contact.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-container">
    <h1>Contact Us</h1>
    <form id="contactForm">
      <label for="contactName">Name</label>
      <input type="text" id="contactName" name="contactName" placeholder="Your Name" required />
      <div class="error" id="contactNameError"></div>
      <label for="contactEmail">Email</label>
      <input type="email" id="contactEmail" name="contactEmail" placeholder="Your Email" required />
      <div class="error" id="contactEmailError"></div>
      <label for="contactMessage">Message</label>
      <textarea id="contactMessage" name="contactMessage" placeholder="Your Message" required></textarea>
      <div class="error" id="contactMessageError"></div>
      <button type="submit">Send</button>
      <div class="success" id="contactSuccess"></div>
    </form>
    <p>Email: hello@simpleco.com</p>
    <p>Phone: +91 9876543210</p>
    <a href="index.html">← Back Home</a>
  </div>
  <!-- Footer -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
      });
  </script>
  <script src="script.js"></script>
</body>
</html>
