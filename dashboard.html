<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard - SimpleCo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="dashboard-container">
    <h1>Welcome, User!</h1>
    <section class="dashboard-section">
      <h2>Your Activity Overview</h2>
      <ul class="dashboard-activity-list">
        <li>No recent activity found.</li>
      </ul>
    </section>
    <section class="dashboard-section">
      <h2>Your Submissions</h2>
      <ul class="dashboard-submissions-list">
        <li>No submissions yet.</li>
      </ul>
    </section>
    <section class="dashboard-section">
      <h2>Your Interactions</h2>
      <ul class="dashboard-interactions-list">
        <li>No interactions yet.</li>
      </ul>
    </section>
    <a href="index.html">← Back Home</a>
  </div>
  <!-- Footer -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
      });
  </script>
  <script src="script.js"></script>
</body>
</html>
