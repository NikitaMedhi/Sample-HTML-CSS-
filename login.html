<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - SimpleCo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-container">
    <form class="login-form" id="loginForm">
      <h2>Login</h2>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required />
      <div class="error" id="emailError"></div>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required />
      <div class="error" id="passwordError"></div>
      <button type="submit">Login</button>
      <div class="signup-text">Don't have an account? <a href="#">Sign up</a></div>
    </form>
    <div class="theme-controls" style="margin-top:24px;">
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">319 Dark</button>
      <button id="contrastToggle" class="contrast-toggle" aria-label="Toggle high contrast">High Contrast</button>
      <button class="font-size-btn" data-size="small" aria-label="Small font">A-</button>
      <button class="font-size-btn" data-size="medium" aria-label="Medium font">A</button>
      <button class="font-size-btn" data-size="large" aria-label="Large font">A+</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
